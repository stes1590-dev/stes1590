<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>訊息後台 | 天香琴</title>
  <meta name="description" content="查看網站聯絡表單收到的訊息。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">天</span>
        <span>
          <strong>天香琴</strong>
          <small>Message inbox</small>
        </span>
      </a>

      <button class="menu-toggle" type="button" aria-label="切換選單" aria-expanded="false" aria-controls="site-nav">
        <span></span>
        <span></span>
      </button>

      <nav id="site-nav" class="site-nav">
        <a href="index.html">首頁</a>
        <a href="works.html">作品集</a>
        <a href="about.html">關於我</a>
        <a href="contact.html">聯絡</a>
        <a href="inbox.html">訊息</a>
      </nav>
    </header>

    <main>
      <section class="hero page-hero reveal">
        <div class="hero-copy">
          <p class="page-breadcrumb"><span>05</span> / 訊息後台</p>
          <p class="eyebrow">Message inbox</p>
          <h1>在網站裡直接查看有人留下的訊息。</h1>
          <p class="page-intro">
            這一頁會透過後端讀取 Supabase 或本機資料檔。第一次使用時，請先輸入你的後台存取碼。
          </p>
        </div>

        <div class="hero-visual">
          <div class="story-panel">
            <form class="access-form">
              <label>
                <span>後台存取碼</span>
                <input name="accessKey" type="password" placeholder="請輸入後台存取碼" required />
              </label>
              <div class="hero-actions">
                <button type="submit" class="btn btn-primary">載入訊息</button>
                <button type="button" class="btn btn-secondary" data-clear-access>清除存取碼</button>
              </div>
              <p class="form-status" data-access-status></p>
            </form>
          </div>
        </div>
      </section>

      <section class="section reveal">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Inbox list</p>
            <h2>最新訊息</h2>
          </div>
          <p class="section-lead" data-inbox-meta>尚未載入資料。</p>
        </div>

        <div class="inbox-list" data-inbox-list>
          <article class="empty-state">
            <h3>還沒有資料</h3>
            <p>輸入後台存取碼後，這裡會列出網站收到的聯絡訊息。</p>
          </article>
        </div>
      </section>

      <footer class="site-footer">
        <span>天香琴 / Message inbox</span>
        <a href="contact.html">回聯絡頁</a>
      </footer>
    </main>
  </div>

  <div class="backdrop" hidden></div>
  <script src="script.js"></script>
  <script src="inbox.js"></script>
</body>
</html>
